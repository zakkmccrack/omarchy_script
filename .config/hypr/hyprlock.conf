source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
  no_fade_in = true
  grace = 1
  disable_loading_bar = false
  hide_cursor = true
  ignore_empty_input = false
  text_trim = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 1
}

animations {
    enabled = true
    animation = fade, 1, 5, linear
}

label {
    monitor =
    text = $TIME
    color = rgba(0, 0, 0, 1.0)
    font_size = 25
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 3
    outer_color = rgba(0, 0, 0, 0.7)
    dots_size = 0.1 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 1 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    inner_color = rgba(159, 168, 236, 0.14)
    font_color = rgba(0, 0, 0, 0.89)
    fade_on_empty = false
    placeholder_text =<b>--</b>
    hide_input = false
    position = 0, 0
    halign = center
    valign = center
    zindex = 20
}

auth {
    fingerprint:enabled = true
}

